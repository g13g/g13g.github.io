<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Links</title>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0e0e10;
      --card-bg: #18181b;
      --border: #27272a;
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --accent: #e4e4e7;
      --btn-bg: #27272a;
      --btn-bg-hover: #3f3f46;
      --btn-border: #3f3f46;
      --shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 8px 32px rgba(0,0,0,0.4);
      --radius: 14px;
      --btn-radius: 10px;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      padding: 2rem 1rem;
      color: var(--text-primary);
    }

    #card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    #avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: var(--btn-bg);
      border: 2px solid var(--border);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #avatar .avatar-placeholder {
      font-size: 2.25rem;
      color: var(--text-secondary);
    }

    .header {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    #name {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    #title {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 400;
    }

    #bio {
      font-size: 0.875rem;
      line-height: 1.65;
      color: var(--text-secondary);
      text-align: center;
      max-width: 340px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
    }

    #links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      border-radius: var(--btn-radius);
      color: var(--text-primary);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
      cursor: pointer;
    }

    .link-btn:hover {
      background: var(--btn-bg-hover);
      border-color: #52525b;
      transform: translateY(-1px);
    }

    .link-btn:active {
      transform: translateY(0);
    }

    .link-btn .icon {
      width: 20px;
      text-align: center;
      font-size: 1rem;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .link-btn .label {
      flex: 1;
    }

    .link-btn .arrow {
      color: var(--text-secondary);
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    #footer {
      font-size: 0.75rem;
      color: #52525b;
      text-align: center;
    }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--btn-bg) 25%, var(--btn-bg-hover) 50%, var(--btn-bg) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f4f5;
        --card-bg: #ffffff;
        --border: #e4e4e7;
        --text-primary: #09090b;
        --text-secondary: #71717a;
        --btn-bg: #f4f4f5;
        --btn-bg-hover: #e4e4e7;
        --btn-border: #e4e4e7;
        --shadow: 0 4px 24px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
      }
    }
  </style>
</head>
<body>
  <div id="card">
    <div id="avatar"><span class="avatar-placeholder"><i class="fa-solid fa-user"></i></span></div>
    <div class="header">
      <div id="name"></div>
      <div id="title"></div>
    </div>
    <p id="bio"></p>
    <div class="divider"></div>
    <div id="links"></div>
    <div id="footer"></div>
  </div>

  <script>
    const ICON_MAP = {
      linkedin:   "fa-brands fa-linkedin",
      github:     "fa-brands fa-github",
      instagram:  "fa-brands fa-instagram",
      strava:     "fa-brands fa-strava",
      "x-twitter":"fa-brands fa-x-twitter",
      twitter:    "fa-brands fa-x-twitter",
      youtube:    "fa-brands fa-youtube",
      tiktok:     "fa-brands fa-tiktok",
      twitch:     "fa-brands fa-twitch",
      discord:    "fa-brands fa-discord",
      spotify:    "fa-brands fa-spotify",
      medium:     "fa-brands fa-medium",
      substack:   "fa-solid fa-newspaper",
      website:    "fa-solid fa-globe",
      email:      "fa-solid fa-envelope",
      phone:      "fa-solid fa-phone",
    };

    async function init() {
      let data;
      try {
        const res = await fetch("data.json");
        if (!res.ok) throw new Error("Failed to load data.json");
        data = await res.json();
      } catch (err) {
        console.error(err);
        document.getElementById("name").textContent = "Error loading content";
        return;
      }
      render(data);
    }

    function render(data) {
      document.title = data.name || "Links";

      // Avatar
      const avatarEl = document.getElementById("avatar");
      if (data.avatar) {
        avatarEl.innerHTML = `<img src="${data.avatar}" alt="${data.name}" />`;
      }

      // Text content
      document.getElementById("name").textContent = data.name || "";
      document.getElementById("title").textContent = data.title || "";
      document.getElementById("bio").textContent = data.bio || "";
      document.getElementById("footer").textContent = data.footer || "";

      // Links
      const linksEl = document.getElementById("links");
      linksEl.innerHTML = "";

      (data.links || []).forEach(link => {
        const iconClass = ICON_MAP[link.icon] || "fa-solid fa-link";
        const a = document.createElement("a");
        a.href = link.url || "#";
        a.className = "link-btn";
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.innerHTML = `
          <span class="icon"><i class="${iconClass}"></i></span>
          <span class="label">${link.label || link.url}</span>
          <span class="arrow"><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
        `;
        linksEl.appendChild(a);
      });
    }

    init();
  </script>
</body>
</html>
